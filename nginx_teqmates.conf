limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream zeebull_backend {
    server 127.0.0.1:8013;
}

server {
    listen 80;
    server_name 35.224.72.199;

    root /var/www/teqmates;
    index index.html;

    # Landing Page - Root (/)
    location / {
        root /var/www/teqmates/landing;
        try_files $uri $uri/ /index.html;
    }

    # Landing Page static assets fallback
    location /assets/ {
        root /var/www/teqmates/landing;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Admin Dashboard - /zeebulladmin
    location /zeebulladmin {
        alias /var/www/teqmates/admin;
        try_files $uri $uri/ /zeebulladmin/index.html;
    }

    # User End - /zeebull
    location /zeebull {
        alias /var/www/teqmates/user;
        try_files $uri $uri/ /zeebull/index.html;
    }

    # API - /api
    location /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://zeebull_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static/Uploads for ResortApp
    location /static {
        alias /var/www/teqmates/ResortApp/static;
    }

    location /uploads {
        alias /var/www/teqmates/ResortApp/uploads;
    }

    # Health check
    location /health {
        proxy_pass http://zeebull_backend/health;
    }
}
