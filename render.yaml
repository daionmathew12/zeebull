services:
  - type: web
    name: zeebull-resort-app
    env: python
    buildCommand: |
      # Build Admin Dashboard
      echo "Building Admin Dashboard..."
      cd dasboard && npm install --legacy-peer-deps && npm run build && cd ..
      # Build User Interface
      echo "Building User Interface..."
      cd userend && npm install --legacy-peer-deps && npm run build && cd ..
      # Install Backend Dependencies
      echo "Installing Backend Dependencies..."
      pip install -r ResortApp/requirements.txt
    startCommand: |
        cd ResortApp && gunicorn main:app --workers 3 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zeebull-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.6

databases:
  - name: zeebull-db
    plan: free # Change to starter for production performance
