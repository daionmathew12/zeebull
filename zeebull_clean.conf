server {
    listen 443 ssl;
    server_name teqmates.com www.teqmates.com;
    client_max_body_size 15M;

    root /var/www/teqmates;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Zeebull API (Specific) - Match this first
    location ^~ /zeebullapi/ {
        proxy_pass http://127.0.0.1:8013/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Zeebull API (Standard)
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8013/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Zeebull Admin Dashboard
    location ^~ /zeebulladmin/ {
        alias /var/www/zeebull/Dashboard/zeebulladmin/;
        index index.html;
        try_files $uri $uri/ /zeebulladmin/index.html;
    }

    location = /zeebulladmin {
        return 301 https://$host/zeebulladmin/;
    }

    # Zeebull User Frontend
    location ^~ /zeebull/ {
        alias /var/www/zeebull/Userend/zeebull/;
        index index.html;
        try_files $uri $uri/ /zeebull/index.html;
    }

    location = /zeebull {
        return 301 https://$host/zeebull/;
    }

    # Zeebull Static Files (for images)
    location ^~ /zeebullfiles/ {
        alias /var/www/zeebull/ResortApp/;
    }

    ssl_certificate /etc/letsencrypt/live/teqmates.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/teqmates.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    server_name teqmates.com www.teqmates.com;

    if ($host = www.teqmates.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = teqmates.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
