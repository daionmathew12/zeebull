server {
    server_name teqmates.com www.teqmates.com;

    root /var/www/pomma-latest;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location /landing/ {
        alias /var/www/pomma-latest/;
    }
    location ^~ /orchidapi/ {
        proxy_pass http://127.0.0.1:8011/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location ^~ /orchidadmin {
        alias /var/www/inventory/dasboard/build;
        try_files $uri $uri/ /orchidadmin/index.html;
    }

    location ^~ /orchid {
        alias /var/www/inventory/build;
        try_files $uri $uri/ /orchid/index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/teqmates.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teqmates.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.teqmates.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = teqmates.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name teqmates.com www.teqmates.com;
    return 404;
}
