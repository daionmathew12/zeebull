server {
    listen 80;
    server_name 34.162.60.52;
    client_max_body_size 50M;

    # 1. User End Portal (Root)
    location / {
        root /var/www/zeebull/userend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Admin Dashboard
    location ^~ /zeebulladmin {
        alias /var/www/zeebull/dasboard/build;
        try_files $uri $uri/ /zeebulladmin/index.html;
    }

    # 3. Backend API Reverse Proxy
    location ^~ /zeebullapi/ {
        proxy_pass http://127.0.0.1:8011/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Static Files / Uploads
    location ^~ /zeebullfiles/uploads/ {
        alias /var/www/zeebull/ResortApp/uploads/;
    }

    location ^~ /zeebullfiles/ {
        alias /var/www/zeebull/ResortApp/uploads/;
    }
}
